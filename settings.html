<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم | الإعدادات</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-container">
        <!-- الشريط الجانبي مع تفعيل زر الإعدادات -->
        <aside class="sidebar">
            <h2>لوحة الإدارة</h2>
            <ul>
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="users.html">المستخدمين</a></li>
                <li><a href="settings.html" class="active">الإعدادات</a></li>
            </ul>
        </aside>

        <!-- نموذج تعديل الحساب -->
        <main class="main-content">
            <header>
                <h1>إعدادات الحساب</h1>
            </header>
            
            <form class="settings-form" onsubmit="event.preventDefault(); alert('تم حفظ التغييرات بنجاح!');">
                <div class="form-group">
                    <label for="username">اسم المستخدم:</label>
                    <input type="text" id="username" placeholder="أدخل اسم المستخدم" required>
                </div>
                
                <div class="form-group">
                    <label for="password">كلمة المرور:</label>
                    <input type="password" id="password" placeholder="أدخل كلمة المرور" required>
                </div>
                
                <button type="submit" class="btn-submit">حفظ التغييرات</button>
            </form>
        </main>
    </div>

</body>
</html>
